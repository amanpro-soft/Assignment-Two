<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            ScaleX

                <li>Blogs</li>
                <li>Contact Us</li>
            </ul>
        </nav>

        <button class="start-btn">

        <div class="card">
            <div class="image-box">

            <div class="content">
